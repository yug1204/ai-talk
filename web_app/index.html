<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - 3D AI Companion</title>
    <!-- Modern Web Font (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="avatar-container" class="idle">
        <div id="canvas-container" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- UI Overlay container -->
    <main class="ui-layer">
        <header>
            <div class="logo">
                <span class="material-symbols-outlined icon-glow">all_inclusive</span>
                <h1>AURA <span>Enterprise Sync</span></h1>
            </div>
            <div class="status-indicator">
                <div class="dot blinking"></div>
                <span id="ai-status-text">System Idle</span>
            </div>
        </header>

        <section class="companion-display">
            <!-- Emotion/State Indicator floating near the avatar -->
            <div id="emotion-badge" class="badge hidden">
                <span class="material-symbols-outlined" id="emotion-icon">sentiment_satisfied</span>
                <span id="emotion-text">SMILE</span>
            </div>
        </section>

        <!-- Chat Output & Input container -->
        <section class="interaction-hud">
            <div class="chat-container">
                <div id="chat-history">
                    <div class="message ai-message">
                        <div class="avatar ai-avatar">A</div>
                        <div class="text">System initialized. I am your specialized AI Assistant. How may I assist you
                            today?</div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <button id="mic-btn" class="send-btn" title="Hold or click to speak">
                    <span class="material-symbols-outlined" id="mic-icon">mic</span>
                </button>
                <input type="text" id="user-input" placeholder="Type or speak your request..." autocomplete="off" />
                <button id="send-btn" class="send-btn">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Custom Logic -->
    <script type="module" src="app.js"></script>
</body>

</html>
